name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
          - os: ubuntu-22.04
            arch: x86_64
          - os: ubuntu-22.04-arm
            arch: arm64
          - os: macos-14
            arch: universal

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            patchelf \
            libssl-dev \
            rpm \
            xdg-utils \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Prepare Tauri signing key
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY secret is missing" >&2
            exit 1
          fi

          RAW='${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}'
          KEY_PATH="$RUNNER_TEMP/tauri_signing.key"

          if echo "$RAW" | head -n1 | grep -q '^untrusted comment:'; then
            printf '%s\n' "$RAW" > "$KEY_PATH"
          elif DECODED=$(printf '%s' "$RAW" | (base64 --decode 2>/dev/null || base64 -D 2>/dev/null)) \
            && echo "$DECODED" | head -n1 | grep -q '^untrusted comment:'; then
            printf '%s\n' "$DECODED" > "$KEY_PATH"
          elif echo "$RAW" | grep -Eq '^[A-Za-z0-9+/=]+$'; then
            ONE=$(printf '%s' "$RAW" | tr -d '\r\n')
            printf '%s\n%s\n' "untrusted comment: tauri signing key" "$ONE" > "$KEY_PATH"
          else
            echo "TAURI_SIGNING_PRIVATE_KEY format is not recognized" >&2
            exit 1
          fi

          if command -v base64 >/dev/null 2>&1; then
            KEY_B64=$(base64 < "$KEY_PATH" | tr -d '\r\n')
          elif command -v openssl >/dev/null 2>&1; then
            KEY_B64=$(openssl base64 -A -in "$KEY_PATH")
          else
            KEY_B64=$(KEY_PATH="$KEY_PATH" node -e "process.stdout.write(require('fs').readFileSync(process.env.KEY_PATH).toString('base64'))")
          fi

          echo "TAURI_SIGNING_PRIVATE_KEY=$KEY_B64" >> "$GITHUB_ENV"
          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" >> "$GITHUB_ENV"
          fi

      - name: Build Tauri App (Windows)
        if: runner.os == 'Windows'
        run: pnpm tauri build

      - name: Build Tauri App (Linux)
        if: runner.os == 'Linux'
        run: pnpm tauri build --bundles appimage,deb,rpm

      - name: Build Tauri App (macOS unsigned)
        if: runner.os == 'macOS'
        shell: bash
        timeout-minutes: 60
        run: |
          set -euxo pipefail
          pnpm tauri build --target universal-apple-darwin

      - name: Prepare Windows Assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $VERSION = $env:GITHUB_REF_NAME
          $msi = Get-ChildItem -Path 'src-tauri/target/release/bundle' -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $msi) { throw 'No Windows MSI installer found' }
          $dest = "juhe365-switch-$VERSION-Windows.msi"
          Copy-Item $msi.FullName (Join-Path release-assets $dest)
          if (Test-Path "$($msi.FullName).sig") {
            Copy-Item "$($msi.FullName).sig" (Join-Path release-assets "$dest.sig")
          }

          $exeCandidates = @(
            'src-tauri/target/release/juhe365-switch.exe',
            'src-tauri/target/x86_64-pc-windows-msvc/release/juhe365-switch.exe'
          )
          $exePath = $exeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($null -ne $exePath) {
            $portableDir = 'release-assets/juhe365-switch-Portable'
            New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
            Copy-Item $exePath $portableDir
            @('# juhe365-switch portable build marker', 'portable=true') | Set-Content -Path (Join-Path $portableDir 'portable.ini') -Encoding UTF8
            Compress-Archive -Path "$portableDir/*" -DestinationPath "release-assets/juhe365-switch-$VERSION-Windows-Portable.zip" -Force
            Remove-Item -Recurse -Force $portableDir
          }

      - name: Prepare Linux Assets
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME}"
          ARCH="${{ matrix.arch }}"

          APPIMAGE=$(find src-tauri/target/release/bundle -name "*.AppImage" | head -1 || true)
          if [ -n "$APPIMAGE" ]; then
            NEW_APPIMAGE="juhe365-switch-${VERSION}-Linux-${ARCH}.AppImage"
            cp "$APPIMAGE" "release-assets/$NEW_APPIMAGE"
            [ -f "$APPIMAGE.sig" ] && cp "$APPIMAGE.sig" "release-assets/$NEW_APPIMAGE.sig" || true
          fi

          DEB=$(find src-tauri/target/release/bundle -name "*.deb" | head -1 || true)
          [ -n "$DEB" ] && cp "$DEB" "release-assets/juhe365-switch-${VERSION}-Linux-${ARCH}.deb" || true

          RPM=$(find src-tauri/target/release/bundle -name "*.rpm" | head -1 || true)
          [ -n "$RPM" ] && cp "$RPM" "release-assets/juhe365-switch-${VERSION}-Linux-${ARCH}.rpm" || true

          test -n "$(find release-assets -maxdepth 1 -type f)"

      - name: Prepare macOS unsigned Assets
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME}"

          BUNDLE_ROOT=""
          for path in \
            "src-tauri/target/universal-apple-darwin/release/bundle" \
            "src-tauri/target/aarch64-apple-darwin/release/bundle" \
            "src-tauri/target/x86_64-apple-darwin/release/bundle" \
            "src-tauri/target/release/bundle"; do
            if [ -d "$path" ]; then
              BUNDLE_ROOT="$path"
              break
            fi
          done
          if [ -z "$BUNDLE_ROOT" ]; then
            echo "No macOS bundle root found" >&2
            exit 1
          fi

          TAR_GZ=$(find "$BUNDLE_ROOT" -name "*.tar.gz" -type f | head -1 || true)
          if [ -n "$TAR_GZ" ]; then
            NEW_TAR_GZ="juhe365-switch-${VERSION}-macOS.tar.gz"
            cp "$TAR_GZ" "release-assets/$NEW_TAR_GZ"
            [ -f "$TAR_GZ.sig" ] && cp "$TAR_GZ.sig" "release-assets/$NEW_TAR_GZ.sig" || true
          fi

          APP_PATH=$(find "$BUNDLE_ROOT" -name "*.app" -type d | head -1 || true)
          if [ -n "$APP_PATH" ]; then
            ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "release-assets/juhe365-switch-${VERSION}-macOS-unsigned.zip"
          fi

          DMG=$(find "$BUNDLE_ROOT" -name "*.dmg" -type f | head -1 || true)
          if [ -n "$DMG" ]; then
            cp "$DMG" "release-assets/juhe365-switch-${VERSION}-macOS-unsigned.dmg"
          fi

          test -n "$(find release-assets -maxdepth 1 -type f)"

      - name: List prepared assets
        shell: bash
        run: ls -la release-assets

      - name: Upload release artifacts to workflow
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ runner.os }}-${{ matrix.arch || runner.arch }}
          path: release-assets/*
          if-no-files-found: error

      - name: List generated bundles (debug)
        if: always()
        shell: bash
        run: |
          echo "Listing bundles in src-tauri/target..."
          find src-tauri/target -maxdepth 5 -type f -name "*.*" 2>/dev/null || true

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: release
    permissions:
      contents: write
    steps:
      - name: Download built release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: List downloaded release artifacts
        shell: bash
        run: ls -la release-assets

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: juhe365-switch ${{ github.ref_name }}
          prerelease: true
          body: |
            ## juhe365-switch ${{ github.ref_name }}

            官方网站: https://api.juhe365.vip

            下载:
            - Windows: juhe365-switch-${{ github.ref_name }}-Windows.msi / juhe365-switch-${{ github.ref_name }}-Windows-Portable.zip
            - macOS unsigned: juhe365-switch-${{ github.ref_name }}-macOS-unsigned.dmg / .zip
            - Linux x86_64: juhe365-switch-${{ github.ref_name }}-Linux-x86_64.AppImage / .deb / .rpm
            - Linux arm64: juhe365-switch-${{ github.ref_name }}-Linux-arm64.AppImage / .deb / .rpm

            macOS 版本未做 Apple Developer 签名和公证。首次打开如有安全提示，请右键打开，或执行:
            ```bash
            xattr -dr com.apple.quarantine /Applications/juhe365-switch.app
            ```
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  assemble-latest-json:
    name: Assemble latest.json
    runs-on: ubuntu-22.04
    needs: publish-release
    permissions:
      contents: write
    steps:
      - name: Download all release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dl
          gh release download "$TAG" --dir dl --repo "$GITHUB_REPOSITORY"
          ls -la dl

      - name: Generate latest.json
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          base_url="https://github.com/$REPO/releases/download/$TAG"

          mac_url=""; mac_sig=""
          win_url=""; win_sig=""
          linux_x64_url=""; linux_x64_sig=""
          linux_arm64_url=""; linux_arm64_sig=""

          shopt -s nullglob
          for sig in dl/*.sig; do
            base=${sig%.sig}
            fname=$(basename "$base")
            url="$base_url/$fname"
            sig_content=$(cat "$sig")
            case "$fname" in
              *macOS*.tar.gz) mac_url="$url"; mac_sig="$sig_content" ;;
              *Windows*.msi|*Windows*.exe) win_url="$url"; win_sig="$sig_content" ;;
              *Linux-x86_64.AppImage) linux_x64_url="$url"; linux_x64_sig="$sig_content" ;;
              *Linux-arm64.AppImage) linux_arm64_url="$url"; linux_arm64_sig="$sig_content" ;;
            esac
          done

          export VERSION PUB_DATE TAG
          export MAC_URL="$mac_url" MAC_SIG="$mac_sig"
          export WIN_URL="$win_url" WIN_SIG="$win_sig"
          export LINUX_X64_URL="$linux_x64_url" LINUX_X64_SIG="$linux_x64_sig"
          export LINUX_ARM64_URL="$linux_arm64_url" LINUX_ARM64_SIG="$linux_arm64_sig"

          node <<'NODE'
          const fs = require('fs');
          const platforms = {};
          function add(key, url, signature) {
            if (url && signature) platforms[key] = { url, signature };
          }
          add('darwin-aarch64', process.env.MAC_URL, process.env.MAC_SIG);
          add('darwin-x86_64', process.env.MAC_URL, process.env.MAC_SIG);
          add('windows-x86_64', process.env.WIN_URL, process.env.WIN_SIG);
          add('linux-x86_64', process.env.LINUX_X64_URL, process.env.LINUX_X64_SIG);
          add('linux-aarch64', process.env.LINUX_ARM64_URL, process.env.LINUX_ARM64_SIG);
          const payload = {
            version: process.env.VERSION,
            notes: `Release ${process.env.TAG}`,
            pub_date: process.env.PUB_DATE,
            platforms,
          };
          fs.writeFileSync('latest.json', `${JSON.stringify(payload, null, 2)}\n`);
          NODE
          cat latest.json

      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          gh release upload "$GITHUB_REF_NAME" latest.json --clobber --repo "$GITHUB_REPOSITORY"
